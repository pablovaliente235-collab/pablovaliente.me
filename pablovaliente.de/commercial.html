    <script>
        document.getElementById('footerYear').textContent = new Date().getFullYear();

        /* Lógica segura de carga de imágenes para Cloudflare */
        (function () {
            const section = document.getElementById('frames-section');
            if (!section) return;
            const grid        = section.querySelector('#photography-grid');
            const projectPath = section.dataset.projectPath;
            const ext         = section.dataset.frameExt || 'webp';
            const altPrefix   = section.dataset.altPrefix || 'Frame';
            const maxFrames   = parseInt(section.dataset.maxFrames) || 20; 
            
            if (!grid || !projectPath) return;

            // Empezamos desde i = 2 porque el frame-01 ya está en el slider
            for (let i = 2; i <= maxFrames; i++) {
                const n = String(i).padStart(2, '0');
                const imgSrc = `${projectPath}/frame-${n}.${ext}`;
                
                const div = document.createElement('div');
                div.className = 'grid-item group aspect-[16/9] overflow-hidden bg-surface-container-low';
                
                const img = document.createElement('img');
                img.className = 'w-full h-full object-cover hover:scale-105 transition-all duration-700 ease-in-out';
                img.src     = imgSrc;
                img.alt     = altPrefix + ' — Frame ' + n;
                img.loading = 'lazy';
                
                img.onerror = function() {
                    this.parentElement.style.display = 'none';
                };

                div.appendChild(img);
                grid.appendChild(div);
            }
        })();

        /* Slider - Lógica de clicks y estabilidad */
        const slider     = document.getElementById('slider');
        const prevBtn    = document.getElementById('prevBtn');
        const nextBtn    = document.getElementById('nextBtn');
        const slideData  = JSON.parse(document.getElementById('slide-data').textContent);
        const labelTitle = document.getElementById('slide-label-title');
        const labelSub   = document.getElementById('slide-label-sub');

        function getScrollAmount() {
            const item = slider.querySelector('.snap-center');
            if (!item) return 0;
            const gap = parseInt(window.getComputedStyle(slider).gap) || 0;
            return item.clientWidth + gap;
        }

        function updateLabel() {
            const idx = Math.max(0, Math.min(Math.round(slider.scrollLeft / getScrollAmount()), slideData.length - 1));
            if (slideData[idx]) {
                labelTitle.textContent = slideData[idx].title;
                labelSub.textContent   = slideData[idx].sub;
            }
        }

        const slidesWrap = document.querySelectorAll('.slide-wrap');
        let isDragging = false;
        
        slidesWrap.forEach(wrap => {
            wrap.addEventListener('click', (e) => {
                if(isDragging) return; 
                const slide = wrap.closest('.snap-center');
                const sliderRect = slider.getBoundingClientRect();
                const slideRect = slide.getBoundingClientRect();
                const sliderCenter = sliderRect.left + sliderRect.width / 2;
                const slideCenter = slideRect.left + slideRect.width / 2;

                if (Math.abs(sliderCenter - slideCenter) > (slideRect.width / 3)) {
                    const offset = slideCenter - sliderCenter;
                    slider.scrollBy({ left: offset, behavior: 'smooth' });
                } else {
                    const clickX = e.clientX - slideRect.left;
                    if (clickX < slideRect.width / 2) {
                        slider.scrollBy({ left: -getScrollAmount(), behavior: 'smooth' });
                    } else {
                        slider.scrollBy({ left: getScrollAmount(), behavior: 'smooth' });
                    }
                }
            });
        });

        nextBtn.addEventListener('click', () => slider.scrollBy({ left:  getScrollAmount(), behavior: 'smooth' }));
        prevBtn.addEventListener('click', () => slider.scrollBy({ left: -getScrollAmount(), behavior: 'smooth' }));
        
        let scrollTimer;
        slider.addEventListener('scroll', () => { clearTimeout(scrollTimer); scrollTimer = setTimeout(updateLabel, 120); });
        
        window.addEventListener('keydown', e => {
            if (e.key === 'ArrowRight') slider.scrollBy({ left:  getScrollAmount(), behavior: 'smooth' });
            if (e.key === 'ArrowLeft')  slider.scrollBy({ left: -getScrollAmount(), behavior: 'smooth' });
        });
        
        slider.addEventListener('touchstart', () => { isDragging = false; }, { passive: true });
        slider.addEventListener('touchmove', () => { isDragging = true; }, { passive: true });
        slider.addEventListener('touchend', () => { setTimeout(() => { isDragging = false; }, 50); }, { passive: true });

        const mobileMenuBtn = document.getElementById('mobile-menu-btn');
        const closeMenuBtn  = document.getElementById('close-menu-btn');
        const mobileOverlay = document.getElementById('mobile-overlay');
        function openMenu()  { mobileOverlay.classList.remove('hidden'); mobileOverlay.classList.add('flex'); mobileMenuBtn.setAttribute('aria-expanded','true');  document.body.classList.add('mobile-menu-open'); }
        function closeMenu() { mobileOverlay.classList.add('hidden');    mobileOverlay.classList.remove('flex'); mobileMenuBtn.setAttribute('aria-expanded','false'); document.body.classList.remove('mobile-menu-open'); }
        mobileMenuBtn.addEventListener('click', openMenu);
        closeMenuBtn.addEventListener('click',  closeMenu);
        mobileOverlay.querySelectorAll('a').forEach(a => a.addEventListener('click', closeMenu));
    </script>
